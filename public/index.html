<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rideau Canal Live Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rideau Canal Skateway Status</h1>
    <div id="dashboard" class="container">
        </div>

    <script>
        async function updateDashboard() {
            const response = await fetch('/api/status');
            const data = await response.json();
            const container = document.getElementById('dashboard');
            container.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.safetyStatus.toLowerCase()}`;
                card.innerHTML = `
                    <h2>${item.location}</h2>
                    <p>Ice Thickness: ${item.avgIce}cm</p>
                    <p>Status: <strong>${item.safetyStatus}</strong></p>
                `;
                container.appendChild(card);
            });
        }
        setInterval(updateDashboard, 10000); // Refresh every 10 seconds
        updateDashboard();
    </script>
</body>
</html>
